<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>セトリ印刷</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#fff;color:#1a1a1a;font-size:14px;}

/* 戻るバー（印刷時は非表示） */
.back-bar{position:fixed;top:0;left:0;right:0;background:#0f6e56;color:#fff;padding:8px 14px;display:flex;align-items:center;gap:10px;z-index:999;font-family:-apple-system,sans-serif;}
.back-btn{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:13px;padding:5px 12px;border-radius:7px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.back-hint{font-size:11px;line-height:1.5;opacity:.92;}

/* 印刷コンテンツ */
.print-content{padding:60px 16px 32px;}
.print-title{font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:3px;}
.print-sub{font-size:11px;color:#888;margin-bottom:14px;}
table{width:100%;border-collapse:collapse;}
thead tr{background:#0f6e56;color:#fff;}
th{padding:8px 8px;text-align:left;font-size:12px;font-weight:600;}
td{padding:7px 8px;font-size:13px;border-bottom:1px solid #e8e7e3;}
tr:nth-child(even) td{background:#f9f9f7;}
.mc-row td{background:#f0f0ee;font-style:italic;color:#555;}
.badge-key{background:#e6f1fb;color:#185fa5;border:1px solid #85b7eb;border-radius:100px;padding:2px 7px;font-size:11px;font-weight:500;white-space:nowrap;}
.badge-bpm{background:#faeeda;color:#854f0b;border:1px solid #ef9f27;border-radius:100px;padding:2px 7px;font-size:11px;font-weight:500;white-space:nowrap;}
.num-cell{color:#aaa;text-align:right;width:24px;font-size:12px;}
.member-section{margin-top:20px;padding-top:12px;border-top:1px solid #ddd;}
.member-title{font-size:12px;font-weight:700;color:#0f6e56;margin-bottom:6px;}
.member-list{display:flex;flex-wrap:wrap;gap:6px 16px;}
.member-item{font-size:13px;}
.member-role{color:#888;font-size:12px;}

/* 印刷時 */
@media print{
  .back-bar{display:none !important;}
  .print-content{padding:16px;}
  body{font-size:12px;}
  th{font-size:11px;padding:6px 6px;}
  td{font-size:11px;padding:5px 6px;}
}
</style>
</head>
<body>

<div class="back-bar">
  <button class="back-btn" onclick="history.back()">← 戻る</button>
  <div class="back-hint">
    📄 <strong>PDF保存：</strong>共有ボタン（□↑）→「プリント」→ 2本指ピンチアウト → 共有 →「PDFを作成」<br>
    📸 <strong>フルページ：</strong>スクリーンショット → 「フルページ」タブを選択
  </div>
</div>

<div class="print-content" id="print-content">
  <div style="text-align:center;padding:40px;color:#aaa;">読み込み中...</div>
</div>

<script>
var SOLOS=[
  {key:'guitar',label:'Guitar'},{key:'bass',label:'Bass'},{key:'piano',label:'Piano'},
  {key:'keys',label:'Keys'},{key:'drums',label:'Drums'},{key:'tp',label:'Trumpet'},
  {key:'tb',label:'Trombone'},{key:'sax-a',label:'Alto Sax'},{key:'sax-t',label:'Tenor Sax'},
  {key:'sax-b',label:'Bari Sax'},{key:'other',label:'Other'},
];
function fmt(s){return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function fmtDate(v){if(!v)return'';var p=v.split('-');return p[0]+'.'+p[1]+'.'+p[2];}
function nowStr(){var d=new Date();return d.getFullYear()+'/'
  +String(d.getMonth()+1).padStart(2,'0')+'/'
  +String(d.getDate()).padStart(2,'0')+' '
  +String(d.getHours()).padStart(2,'0')+':'
  +String(d.getMinutes()).padStart(2,'0');}

function load(){
  try{
    var songs=JSON.parse(localStorage.getItem('sl_print_songs')||'[]');
    var type=parseInt(localStorage.getItem('sl_print_type')||'1');
    var date=fmtDate(localStorage.getItem('sl_print_date')||'');
    var venue=(localStorage.getItem('sl_print_venue')||'').trim();
    var artist=(localStorage.getItem('sl_print_artist')||'').trim();
    var allotMin=parseInt(localStorage.getItem('sl_print_allot_min')||'0');
    var allotSec2=parseInt(localStorage.getItem('sl_print_allot_sec')||'0');
    var members=JSON.parse(localStorage.getItem('sl_print_members')||'[]');

    var titleParts=[artist,date,venue].filter(Boolean);
    var title=titleParts.join(' / ')||'セットリスト';
    var allotSec=allotMin*60+allotSec2;
    var totalSec=songs.reduce(function(a,x){return a+x.duration;},0);
    var typeLabel=type===1?'👥 メンバー用':'🎛 スタッフ用';

    var rows='';var realNum=0;
    songs.forEach(function(s){
      var isMC=s.type==='mc';if(!isMC&&!s.blank)realNum++;
      var mcMemo=type===2?(s.mcMemoStaff||''):(s.mcMemoMember||'');
      if(isMC){
        var colspan=type===2?6:5;
        rows+='<tr class="mc-row"><td colspan="'+colspan+'" style="padding:7px 8px;">💬 MC / 転換'+(mcMemo?' — <span style="font-style:normal;color:#333;">'+mcMemo+'</span>':'')+'</td></tr>';
      } else {
        var soloText=(s.solos||[]).map(function(k){
          var o=SOLOS.filter(function(x){return x.key===k;})[0];
          return k==='other'?(s.soloOther||'Other'):(o?o.label:'');
        }).filter(Boolean).join(', ')||'—';
        var memoItems=[];
        if(s.pa)memoItems.push('<b>PA:</b> '+s.pa.replace(/\n/g,'<br>'));
        if(s.light)memoItems.push('<b>照明:</b> '+s.light.replace(/\n/g,'<br>'));
        if(s.memoOther)memoItems.push('<b>他:</b> '+s.memoOther.replace(/\n/g,'<br>'));
        rows+='<tr>'
          +'<td class="num-cell">'+(s.blank?'':realNum)+'</td>'
          +'<td style="font-weight:500;">'+(s.blank?'<span style="color:#aaa;font-style:italic;">未入力</span>':s.name)+'</td>'
          +(type===1?'<td><span class="badge-key">'+(s.key||'—')+'</span></td>':'')
          +'<td><span class="badge-bpm">'+(s.bpm?s.bpm+' BPM':'—')+'</span></td>'
          +'<td>'+soloText+'</td>'
          +(type===2?'<td style="color:#666;font-variant-numeric:tabular-nums;">'+fmt(s.duration)+'</td>':'')
          +(type===2?'<td>'+(memoItems.join('<br>'))+'</td>':'')
          +'</tr>';
      }
    });

    var memberSection='';
    if(type===2&&members.length>0){
      memberSection='<div class="member-section">'
        +'<div class="member-title">メンバー</div>'
        +'<div class="member-list">'
        +members.map(function(m){
          return '<span class="member-item">'+m.name
            +(m.role?'<span class="member-role"> ('+m.role+')</span>':'')+'</span>';
        }).join('')
        +'</div></div>';
    }

    var colHeader=type===1
      ?'<th class="num-cell">#</th><th>曲名</th><th style="width:60px;">Key</th><th style="width:75px;">BPM</th><th>ソロ担当</th>'
      :'<th class="num-cell">#</th><th>曲名</th><th style="width:75px;">BPM</th><th>ソロ担当</th><th style="width:44px;">時間</th><th>要望</th>';

    document.getElementById('print-content').innerHTML=
      '<div class="print-title">🎸 '+title+'</div>'
      +'<div class="print-sub">'+typeLabel+' ・ '
      +songs.filter(function(x){return x.type==='song'&&!x.blank;}).length+'曲 ・ 合計 '+fmt(totalSec)
      +(allotSec?' / 持ち時間 '+fmt(allotSec):'')+' ・ '+nowStr()+'</div>'
      +'<table><thead><tr>'+colHeader+'</tr></thead><tbody>'+rows+'</tbody></table>'
      +memberSection;

    document.title=title+' — セトリ';
  }catch(e){
    document.getElementById('print-content').innerHTML='<div style="padding:40px;color:#dc2626;">データの読み込みに失敗しました。アプリに戻って再度お試しください。</div>';
  }
}

load();
</script>
</body>
</html>
